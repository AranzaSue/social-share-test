<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compartir | Tech Summit 2026</title>
    
    <meta property="og:title" content="✨ Tech Summit 2026 | Impulsando la Próxima Era Tecnológica">
    <meta property="og:description" content="Líderes, innovación y el futuro de la tecnología en un solo lugar. #TechSummit2026 #Innovation #IBMTech">
    <meta property="og:image" content="https://front-aiforum.26t9w5z134g6.us-south.codeengine.appdomain.cloud/ai-forum-horizontal.jpeg">
    <meta property="og:url" content="https://aranzasue.github.io/social-share-test/">
    <meta property="og:type" content="website">

    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --ibm-blue: #0f62fe;
            --ibm-purple: #8a3ffc;
            --bg-main: #e5dfe0; /* Color base */
            --layer-01: #ffffff; /* Contenedor blanco puro para resaltar */
            --text-01: #161616; /* Texto casi negro para lectura clara */
            --text-02: #525252; /* Texto secundario gris */
            --border: #d1cccd;
        }

        body { 
            background: var(--bg-main); 
            color: var(--text-01); 
            font-family: 'IBM Plex Sans', sans-serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .container { 
            text-align: center; 
            padding: 2.5rem; 
            background: var(--layer-01); 
            border-bottom: 6px solid var(--ibm-blue); /* Borde abajo para look moderno */
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
            max-width: 450px; 
            width: 90%;
            border-radius: 4px;
        }

        .eyebrow { 
            font-size: 0.75rem; 
            letter-spacing: 2px; 
            color: var(--ibm-purple); 
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        h1 { font-size: 1.75rem; font-weight: 600; margin: 0 0 1.5rem 0; letter-spacing: -0.5px; }

        .preview-card {
            background: #f4f4f4;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
            overflow: hidden;
            border-radius: 2px;
        }

        .preview-card img { 
            width: 100%; 
            display: block;
            opacity: 1; /* Imagen clara en fondo claro */
        }

        .instruction-box {
            background: #f4f4f4;
            padding: 1rem;
            margin-bottom: 1.5rem;
            text-align: left;
            border-left: 4px solid var(--ibm-purple);
        }

        .instruction-box p { font-size: 0.85rem; margin: 0; color: var(--text-02); line-height: 1.4; }

        .btn {
            background: var(--ibm-blue);
            color: white;
            border: none;
            padding: 14px 24px;
            font-family: inherit;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            margin-bottom: 10px;
        }

        .btn:hover { background: #0043ce; }
        .btn:active { transform: scale(0.98); }

        .btn-secondary {
            background: transparent;
            color: var(--ibm-blue);
            border: 1px solid var(--ibm-blue);
        }

        .btn-secondary:hover { background: #edf4ff; }

        .success-msg {
            color: #198038;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 10px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="eyebrow">Ready to Share</div>
        <h1>AI Forum 2026</h1>

        <div class="preview-card">
            <img src="https://front-aiforum.26t9w5z134g6.us-south.codeengine.appdomain.cloud/ai-forum-horizontal.jpeg" alt="Banner Preview">
        </div>

        <div class="instruction-box">
            <p><strong>1. Copia</strong> el mensaje personalizado.<br>
               <strong>2. Pégalo</strong> en la publicación de LinkedIn.</p>
        </div>

        <button id="copyBtn" class="btn" onclick="copyText()">
            <span id="btnIcon">📋</span> <span id="btnText">Copiar Mensaje</span>
        </button>

        <button class="btn btn-secondary" onclick="shareOnLinkedIn()">
            Abrir LinkedIn ↗
        </button>

        <div id="successMsg" class="success-msg">✔ ¡Mensaje copiado!</div>
    </div>

    <script>
        const shareText = "¡Increíble experiencia en el #AIForum2026! 🚀 Aprendiendo sobre el futuro de la IA y la innovación tecnológica. #IBMTech #Innovation";
        const linkedInUrl = "https://www.linkedin.com/sharing/share-offsite/?url=https://aranzasue.github.io/social-share-test/";

        function copyText() {
            navigator.clipboard.writeText(shareText).then(() => {
                const msg = document.getElementById('successMsg');
                const btnText = document.getElementById('btnText');
                const btnIcon = document.getElementById('btnIcon');
                
                msg.style.display = 'block';
                btnText.innerText = "¡Copiado!";
                btnIcon.innerText = "✅";

                // Redirección opcional a los 15 segundos
                setTimeout(shareOnLinkedIn, 15000);
            });
        }

        function shareOnLinkedIn() {
            window.open(linkedInUrl, '_blank');
        }
    </script>
</body>
</html>
